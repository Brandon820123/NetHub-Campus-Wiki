<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>资源中心</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar container">
      <a class="brand" href="/index.html">校园论坛</a>
      <div class="nav-links" aria-label="主导航">
        <a href="/index.html">首页</a>
        <a href="/projects.html">CAS 项目库</a>
        <a class="active" href="/resources.html">资源中心</a>
      </div>
    </nav>
  </header>

  <section class="container resource-filter-bar">
    <div class="card resource-filter-card">
      <h1>资源筛选</h1>
      <div class="resource-filter-grid">
        <label>
          <span>关键词</span>
          <input id="resourceSearch" class="input" type="search" placeholder="搜索名称、内容、简介" />
        </label>
        <button id="resourceSearchButton" class="button secondary compact" type="button">搜索</button>

        <label>
          <span>年份</span>
          <select id="resourceYear" class="input">
            <option value="">全部年份</option>
          </select>
        </label>

        <label>
          <span>排序</span>
          <select id="resourceSort" class="input">
            <option value="hot">最热</option>
            <option value="new">最新</option>
            <option value="download">下载最多</option>
            <option value="old">最早</option>
          </select>
        </label>
      </div>
    </div>
  </section>

  <main class="container library-layout">
    <aside class="card sidebar resource-sidebar">
      <h2>资源类型</h2>
      <div id="resourceCategoryList" class="category-list"></div>

      <section id="photoFilters" class="photo-filters" aria-label="照片筛选">
        <h3>选择活动</h3>
        <div id="activityList" class="category-list"></div>
      </section>
    </aside>

    <section class="card content-panel resource-panel">
      <div id="resourceView">
        <div class="section-title">
          <div>
            <h1>资源中心</h1>
            <span id="resourceCount">加载中...</span>
          </div>
        </div>
        <div id="resourceGrid" class="resource-grid"></div>
      </div>

      <div id="photoView" class="photo-view">
        <div class="section-title with-control">
          <div>
            <h1 id="photoTitle">活动照片</h1>
            <span id="photoMeta">选择活动查看照片</span>
          </div>
          <button id="downloadActivity" class="button secondary" type="button">下载压缩文件</button>
        </div>
        <div id="photoGrid" class="photo-grid" aria-live="polite"></div>
      </div>

      <div id="yearbookView" class="yearbook-view">
        <div class="section-title with-control">
          <div>
            <h1 id="yearbookTitle">Yearbook</h1>
            <span id="yearbookMeta">正在加载 Yearbook...</span>
          </div>
          <div class="yearbook-actions">
            <button id="backToResources" class="button secondary" type="button">返回资源列表</button>
            <a id="downloadYearbook" class="button secondary" href="#" download>下载 PDF</a>
          </div>
        </div>
        <div class="yearbook-reader" aria-live="polite">
          <button id="yearbookPrev" class="yearbook-nav prev" type="button" aria-label="上一组页面">‹</button>
          <div id="yearbookPages" class="yearbook-pages"></div>
          <button id="yearbookNext" class="yearbook-nav next" type="button" aria-label="下一组页面">›</button>
        </div>
      </div>
    </section>
  </main>

  <div id="photoModal" class="photo-modal" aria-hidden="true" role="dialog" aria-label="照片详情">
    <div class="photo-modal-backdrop" data-close-modal></div>
    <section class="photo-modal-panel">
      <div class="photo-modal-head">
        <div>
          <h2 id="modalTitle">照片详情</h2>
          <p id="modalMeta"></p>
        </div>
        <div class="modal-actions">
          <button id="modalDownload" class="button secondary" type="button">下载</button>
          <button class="icon-button" type="button" aria-label="关闭" data-close-modal>×</button>
        </div>
      </div>
      <div class="photo-modal-stage">
        <button id="modalPrev" class="photo-modal-nav prev" type="button" aria-label="上一张">‹</button>
        <img id="modalImage" src="" alt="" />
        <button id="modalNext" class="photo-modal-nav next" type="button" aria-label="下一张">›</button>
      </div>
    </section>
  </div>

  <footer class="footer">资源中心支持年鉴、活动照片和常用资料筛选</footer>
  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=auth-ui6"></script>
  <script src="/js/resources.js"></script>
</body>
</html>
